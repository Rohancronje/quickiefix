<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password updated · QuickieFix</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23FFB020'/%3E%3Ctext y='72' x='50' font-size='60' text-anchor='middle'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background: #0B1220; color: #F4F6FB; min-height: 100vh;
      display: grid; place-items: center; padding: 24px;
    }
    .card {
      max-width: 420px; width: 100%; text-align: center;
      background: linear-gradient(180deg, #131C2E, #1B2740);
      border: 1px solid #2A3654; border-radius: 24px; padding: 40px 28px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    }
    .wordmark { font-size: 24px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 24px; }
    .wordmark span { color: #FFB020; }
    .check {
      width: 64px; height: 64px; border-radius: 50%; background: rgba(31,180,113,0.15);
      display: grid; place-items: center; font-size: 32px; margin: 0 auto 20px;
    }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
    p { color: #9AA5BD; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block; background: #FFB020; color: #0B1220; font-weight: 800;
      text-decoration: none; padding: 15px 28px; border-radius: 12px; font-size: 15px;
    }
    .hint { color: #6B7690; font-size: 13px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="wordmark">Quickie<span>Fix</span></div>
    <div class="check">✅</div>
    <h1>Password updated</h1>
    <p>Your password has been changed. Open the QuickieFix app and sign in with your new password.</p>
    <a class="btn" href="quickiefix://">Open QuickieFix &amp; sign in</a>
    <div class="hint">If the button doesn't open the app, launch QuickieFix from your home screen.</div>
  </div>
</body>
</html>
