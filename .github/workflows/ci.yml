name: CI

# Fast quality gate on every push and pull request. Runs on clean Ubuntu
# runners so it never hits the local Windows shell glitch. No secrets needed —
# this only typechecks and builds, it does not deploy.

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: App typecheck + web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install app deps
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Unit tests (jest)
        run: npm run test:ci

      - name: Web export smoke build
        run: npm run build:web

  portal:
    name: Back-office / portal build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Install portal deps
        working-directory: portal
        # npm install (not ci): the portal pulls platform-specific wasm optional
        # deps (@emnapi/* via oxlint/Vite) that a Windows-generated lockfile
        # can't satisfy under strict `npm ci` on Linux.
        run: npm install --no-audit --no-fund

      - name: Build portal
        working-directory: portal
        run: npm run build

  functions:
    name: Cloud Functions lint check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions deps
        working-directory: functions
        run: npm ci

      - name: Lint functions
        working-directory: functions
        run: npm run lint --if-present
