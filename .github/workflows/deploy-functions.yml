name: Deploy Cloud Functions (staging)

# Staging-first: when functions code changes on main this deploys them to the
# STAGING project (prod functions ship via the manual "Deploy to production"
# workflow). Split out because functions deploys are the slowest step. The
# BREVO_API_KEY stays in Google Secret Manager and is bound to the functions
# there — it is never needed as a GitHub secret.
#
# Required repo secret:
#   FIREBASE_TOKEN  ->  output of `firebase login:ci`

on:
  push:
    branches: [main]
    paths:
      - "functions/**"
  workflow_dispatch: {}

concurrency:
  group: deploy-functions
  cancel-in-progress: false

jobs:
  functions:
    name: Deploy functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions deps
        working-directory: functions
        run: npm ci

      - name: Deploy functions (staging)
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: >
          npx --yes firebase-tools deploy
          --only functions
          --project staging
          --token "$FIREBASE_TOKEN"
          --non-interactive
